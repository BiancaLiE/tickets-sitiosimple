<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Panel de Tickets</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body style="background-color:#82bfae;">
  <div class="d-flex justify-content-end">
    <button class="btn btn-danger mb-2" onclick="logout()">
      🚪 Cerrar sesión
    </button>
  </div>
  <div class="container-fluid mt-2">
    <h1 class="text-start mb-4">🧾 Panel de Tickets EDB</h1>
    <div class="row">
      <!-- LISTA DE TICKETS -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-header fw-bold">
            Tickets recibidos
          </div>
          <input 
            type="text" 
            id="searchInput" 
            placeholder="Buscar por cliente o número de orden..."
            class="form-control mb-3"
          />
          <div class="card-body" id="ticketsList" style="max-height: 75vh; overflow-y: auto;">
            <!-- Se llena con admin.js -->
          </div>
          <nav class="mt-3 d-flex justify-content-center">
            <ul id="pagination" class="pagination pagination-sm"></ul>
          </nav>
        </div>
      </div>

      <!-- DETALLE DEL TICKET -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-header fw-bold">
            Detalle del ticket
          </div>
          <div class="card-body" id="ticketDetail">
            <p class="text-muted">
              Seleccioná un ticket para ver o editar los detalles
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- admin.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="/admin.js"></script>

  </body>
</html>
